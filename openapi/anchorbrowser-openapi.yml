            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/task/{taskId}/deploy:
    post:
      summary: Deploy Task (Legacy)
      description: >
        Deploys a task by creating a new version with auto-incremented version
        number.

        This is the recommended way to publish task changes.


        If you are using the new Task Builder, see the non-deprecated Tasks
        endpoints in this API reference.
      security:
        - api_key_header: []
      tags:
        - Tasks (Legacy)
      parameters:
        - name: taskId
          in: path
          required: true
          description: The ID of the task
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublishVersionRequest'
      responses:
        '200':
          description: Task deployed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskVersionResponse'
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Failed to deploy task
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/task/{taskId}/executions:
    get:
      summary: List Task Executions (Legacy)
      description: >
        Retrieves execution history for a task, including success/failure
        status,

        execution times, and outputs. Results can be filtered by version and
        status.


        If you are using the new Task Builder, see the Tasks V2 endpoints in
        this API reference.
      security:
        - api_key_header: []
      tags:
        - Tasks (Legacy)
      parameters:
        - name: taskId
          in: path
          required: true
          description: The ID of the task
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          required: false
          description: Page number
          schema:
            type: string
            pattern: ^[1-9]\d*$
            default: '1'
        - name: limit
          in: query
          required: false
          description: Number of results per page
          schema:
            type: string
            pattern: ^[1-9]\d*$
            default: '10'
        - name: status
          in: query
          required: false
          description: Filter by execution status
          schema:
            type: string
            enum:
              - success
              - failure
              - timeout
              - cancelled
              - queued
              - running
        - name: version
          in: query
          required: false
          description: Filter by task version
          schema:
            type: string
      responses:
        '200':
          description: Task executions retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskExecutionResultsListResponse'
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Failed to retrieve task executions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/task/{taskId}/executions/{executionId}:
    get:
      summary: Get Task Execution Result (Legacy)
      description: >
        Retrieves a single execution result by its ID. This endpoint is useful
        for polling

        execution status in async mode or retrieving detailed execution
        information.


        If you are using the new Task Builder, see the Tasks V2 endpoints in
        this API reference.
      security:
        - api_key_header: []
      tags:
        - Tasks (Legacy)
      parameters:
        - name: taskId
          in: path
          required: true
          description: The ID of the task
          schema:
            type: string
            format: uuid
        - name: executionId
          in: path
          required: true
          description: The ID of the execution result
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Execution result retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskExecutionResultResponse'
        '404':
          description: Task or execution result not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Failed to retrieve execution result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/task/{taskId}/{taskVersion}:
    get:
      summary: Get Task Version (Legacy)
      description: >
        Retrieves a specific version of a task, including the full code content.


        If you are using the new Task Builder, see the Tasks V2 endpoints in
        this API reference.
      security:
        - api_key_header: []
      tags:
        - Tasks (Legacy)
      parameters:
        - name: taskId
          in: path
          required: true
          description: The ID of the task
          schema:
            type: string
            format: uuid
        - name: taskVersion
          in: path
          required: true
          description: The version to retrieve (draft, latest, or version number)
          schema:
            type: string
            pattern: ^(draft|latest|\d+)$
      responses:
        '200':
          description: Task version retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskVersionResponse'
        '404':
          description: Task or version not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Failed to retrieve task version
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Publish Task Version (Legacy)
      description: >
        Publishes a specific version of a task. This creates a new version if it
        doesn't exist,

        or updates an existing version's metadata.


        If you are using the new Task Builder, see the non-deprecated Tasks
        endpoints in this API reference.
      security:
        - api_key_header: []
      tags:
        - Tasks (Legacy)
      parameters:
        - name: taskId
          in: path
          required: true
          description: The ID of the task
          schema:
            type: string
            format: uuid
        - name: taskVersion
          in: path
          required: true
          description: The version to publish (cannot be draft)
          schema:
            type: string
            pattern: ^\d+$
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublishVersionRequest'
      responses:
        '200':
          description: Task version published successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskVersionResponse'
        '400':
          description: Cannot publish to draft version
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Failed to publish task version
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Delete Task Version (Legacy)
      description: >
        Soft deletes a specific version of a task. The version will no longer be
        accessible

        but the data is preserved for potential recovery.


        If you are using the new Task Builder, see the Tasks V2 endpoints in
        this API reference.
      security:
        - api_key_header: []
      tags:
        - Tasks (Legacy)
      parameters:
        - name: taskId

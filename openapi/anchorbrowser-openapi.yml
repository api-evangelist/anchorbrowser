  /v1/certificates:
    post:
      summary: Upload Certificate
      description: >
        Upload a CA certificate to trust in browser sessions. Certificates are
        managed at the team level.

        Once uploaded, reference the certificate by name when creating sessions
        to trust services using that CA.


        See [CA Certificates documentation](/advanced/ca-certificates) for more
        details.
      security:
        - api_key_header: []
      tags:
        - Certificates
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - name
                - file
              properties:
                name:
                  type: string
                  description: >-
                    Unique identifier for the certificate (alphanumeric,
                    hyphens, underscores only, 1-255 characters)
                  pattern: ^[a-zA-Z0-9\-_]+$
                file:
                  type: string
                  format: binary
                  description: Certificate file (.crt, .pem, .cer, or .der format)
                description:
                  type: string
                  description: >-
                    Optional description of the certificate (max 1000
                    characters)
                  maxLength: 1000
      responses:
        '200':
          description: Certificate uploaded successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CertificateResponse'
        '400':
          description: >-
            Invalid request - missing file, invalid name format, or unsupported
            file type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: A certificate with this name already exists for your team
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Unable to upload certificate
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      summary: List Certificates
      description: Get all CA certificates uploaded for the team
      security:
        - api_key_header: []
      tags:
        - Certificates
      responses:
        '200':
          description: List of certificates retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CertificateListResponse'
        '500':
          description: Unable to list certificates
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/certificates/{name}:
    delete:
      summary: Delete Certificate
      description: >-
        Delete a CA certificate by name. The certificate will be removed from

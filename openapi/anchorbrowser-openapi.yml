  /v1/sessions:
    get:
      summary: List Sessions History Page
      description: >
        Retrieves a paginated list of sessions for the authenticated team with
        support for

        sorting and advanced filtering. This endpoint mirrors the backend
        session history-page

        filtering behavior.
      security:
        - api_key_header: []
      tags:
        - Browser Sessions
      parameters:
        - in: query
          name: page
          required: false
          description: Page number to fetch.
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: limit
          required: false
          description: Number of sessions per page. Supported values are 10, 20, and 50.
          schema:
            type: integer
            enum:
              - 10
              - 20
              - 50
            default: 10
        - in: query
          name: sort_by
          required: false
          description: >
            Sort field. Common values are `created_at`, `session_id`,
            `used_credits`,

            `created_at`, and `api_key_name`.
          schema:
            type: string
            default: created_at
        - in: query
          name: sort_order
          required: false
          description: Sort direction.
          schema:
            type: string
            enum:
              - asc
              - desc
            default: asc
        - in: query
          name: search
          required: false
          description: Comma-separated tag search terms (partial, case-insensitive).
          schema:
            type: string
        - in: query
          name: status
          required: false
          description: Exact session status filter.
          schema:
            type: string
        - in: query
          name: tags
          required: false
          description: Comma-separated tag list. Session must include all provided tags.
          schema:
            type: string
          example: production,scraping
        - in: query
          name: domains
          required: false
          description: >-
            Comma-separated domain list. Session must include all provided
            domains.
          schema:
            type: string
          example: example.com,anchorbrowser.io
        - in: query
          name: created_from
          required: false
          description: Include sessions created at or after this timestamp (ISO 8601).
          schema:
            type: string
            format: date-time
        - in: query
          name: created_to
          required: false
          description: Include sessions created at or before this timestamp (ISO 8601).
          schema:
            type: string
            format: date-time
        - in: query
          name: batch_id
          required: false
          description: Filter by batch identifier.
          schema:
            type: string
        - in: query
          name: task_initiated
          required: false
          description: Filter by whether the session was task-initiated.
          schema:
            type: boolean
        - in: query
          name: playground
          required: false
          description: Filter by whether the session is a playground session.
          schema:
            type: boolean
        - in: query
          name: proxy
          required: false
          description: Filter by whether proxy was active for the session.
          schema:
            type: boolean
        - in: query
          name: extra_stealth
          required: false
          description: Filter by whether extra stealth mode was active.
          schema:
            type: boolean
        - in: query
          name: profile_name
          required: false
          description: Case-insensitive partial match on browser profile name.
          schema:
            type: string
          example: Default profile
      responses:
        '200':
          description: Paginated sessions history retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionHistoryPageResponse'
              examples:
                filteredSessionsPage:
                  summary: Example filtered session page
                  value:
                    data:
                      sessions:
                        - id: sess_123456
                          status: completed
                          tags:
                            - production
                            - scraping
                          headless: false
                          recording: true
                          used_credits: 12.5
                          proxy_bytes: 102400
                          proxy_type: anchor_proxy
                          steps: 48
                          duration: 420
                          created_at: '2026-03-09T12:34:56.789Z'
                          user_configuration:
                            session:
                              idle_timeout: 300
                          task_initiated: true
                          task_executions_count: 2
                          api_key_name: automation-key
                          browser_ip: 192.0.2.10
                          domains:
                            - example.com
                      total: 145
                      page: 1
                      total_pages: 15
        '400':
          description: >-
            Invalid query parameters (for example unsupported limit or sort
            options).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Start Browser Session
      description: >-
        Allocates a new browser session for the user, with optional
        configurations for ad-blocking, captcha solving, proxy usage, and idle
        timeout.
      security:
        - api_key_header: []
      tags:
        - Browser Sessions
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionCreateRequestSchema'
      responses:
        '200':
          description: Successfully returned a browser object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionCreateResponseSchema'
        '400':
          description: Bad Request - Invalid request parameters or configuration.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                captchaSolverRequiresProxy:
                  summary: CAPTCHA solver requires proxy to be active.
                  value:
                    error:
                      code: 400
                      message: CAPTCHA solver requires proxy to be active.
        '402':
          description: Payment Required - Insufficient credits to allocate a new browser
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Too many requests — session creation rate limit exceeded.
          headers:
            RateLimit:
              description: |
                IETF draft-8 Rate-limit headers.
              schema:
                type: string
              example: '"5-in-1min"; r=0; t=58'
            RateLimit-Policy:
              schema:
                type: string
              example: '"5-in-1min"; q=5; w=60; pk=:ZGQ0YzBjYzVhZjQ1:'
            Retry-After:
              description: >-
                Seconds until the rate-limit window resets (matches the `t`
                parameter in `RateLimit` when the limit is exceeded).
              schema:
                type: integer
              example: 58
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                sessionCreationRateLimited:
                  summary: Session creation rate limit exceeded
                  value:
                    error:
                      code: 429
                      message: Session creation rate limit exceeded.
  /v1/sessions/async:
    post:
      summary: Start Browser Session (async)
      description: |
        Non-blocking variant of `POST /v1/sessions`. Returns a `request_id`
        immediately and provisions the underlying browser pod in the
        background. Poll `GET /v1/sessions/async/{request_id}/status` until
        `status` becomes `ready` to obtain the resolved `session_id`,
        `cdp_url` and `live_view_url`.
      security:
        - api_key_header: []
      tags:
        - Browser Sessions
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionCreateRequestSchema'
      responses:
        '200':
          description: >-
            Async session creation accepted; poll the status endpoint to
            resolve.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncSessionCreateResponseSchema'
        '400':
          description: Invalid request parameters or configuration.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '402':
          description: Payment Required - Insufficient credits.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Project cost limit reached.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: API key would exceed batch browser limit.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/sessions/async/{request_id}/status:
    get:
      summary: Async Session Status
      description: |
        Polling endpoint paired with `POST /v1/sessions/async`. Returns the
        current lifecycle `status` of the async request and, once the pod is
        up, the embedded `session` object containing `session_id`, `cdp_url`
        and `live_view_url`.
      security:
        - api_key_header: []
      tags:
        - Browser Sessions
      parameters:
        - name: request_id
          in: path
          required: true
          description: The `request_id` returned from `POST /v1/sessions/async`.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Async session status retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncSessionStatusResponseSchema'
        '401':
          description: Invalid API Key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Async request not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
